<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Технические работы</title>
  </head>

  <body>
    <header class="header">
      <div class="container">
        <div class="header__content">
          <button
            class="header__menu"
            type="button"
            aria-label="Переключаетель меню"
          >
            <svg
              class="header__menu-icon"
              width="60"
              height="23"
              aria-hidden="true"
            >
              <use xlink:href="images/sprite.svg#icon-menu"></use>
            </svg>
          </button>
          <a
            class="header__logo-link"
            href="perfectionists.html"
            aria-label="Переход на главную страницу"
          >
            <svg
              class="header__logo"
              width="114"
              height="26"
              aria-hidden="true"
            >
              <use xlink:href="images/sprite.svg#logo"></use>
            </svg>
          </a>
        </div>
      </div>
    </header>
    <main>
      <div class="technical-work">
        <div class="container">
          <div class="technical-work__info">
            <h2 class="technical-work__info-title">
              Извините, на сайте проводятся технические работы
            </h2>
            <p class="technical-work__info-text">
              Примерное завершение технических работ в 12:00 МСК 05.04.2024
              Присоединяйтесь к нам в социальных сетях
            </p>
            <ul class="socials">
              <li class="socials__item">
                <a
                  class="socials__link"
                  href="#"
                  aria-label="Ссылка на Whatsapp"
                >
                  <svg
                    class="socials__icon"
                    width="20"
                    height="20"
                    aria-hidden="true"
                  >
                    <use xlink:href="images/sprite.svg#icon-wa"></use>
                  </svg>
                </a>
              </li>
              <li class="socials__item">
                <a
                  class="socials__link"
                  href="#"
                  aria-label="Ссылка на Телеграм"
                >
                  <svg
                    class="socials__icon"
                    width="22"
                    height="18"
                    aria-hidden="true"
                  >
                    <use xlink:href="images/sprite.svg#icon-tg"></use>
                  </svg>
                </a>
              </li>
              <li class="socials__item">
                <a class="socials__link" href="#" aria-label="Ссылка на ВК">
                  <svg
                    class="socials__icon"
                    width="24"
                    height="14"
                    aria-hidden="true"
                  >
                    <use xlink:href="images/sprite.svg#icon-vk"></use>
                  </svg>
                </a>
              </li>
              <li class="socials__item">
                <a
                  class="socials__link"
                  href="#"
                  aria-label="Ссылка на Youtube"
                >
                  <svg
                    class="socials__icon"
                    width="22"
                    height="16"
                    aria-hidden="true"
                  >
                    <use xlink:href="images/sprite.svg#icon-youtube"></use>
                  </svg>
                </a>
              </li>
              <li class="socials__item">
                <a class="socials__link" href="#" aria-label="Ссылка на Yandex">
                  <svg
                    class="socials__icon"
                    width="20"
                    height="20"
                    aria-hidden="true"
                  >
                    <use xlink:href="images/sprite.svg#icon-ya"></use>
                  </svg>
                </a>
              </li>
              <li class="socials__item">
                <a class="socials__link" href="#" aria-label="Ссылка на HH">
                  <svg
                    class="socials__icon"
                    width="20"
                    height="20"
                    aria-hidden="true"
                  >
                    <use xlink:href="images/sprite.svg#icon-hh"></use>
                  </svg>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="container"></div>
    </footer>
  </body>
</html>
